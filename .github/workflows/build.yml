name: Package and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# The release job uses the repository-scoped GITHUB_TOKEN. No separate
# github_token secret is required.
permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Ensure the tag matches package.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          test "$TAG" = "v$(node -p \"require('./package.json').version\")"

  package:
    name: Package ${{ matrix.name }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64 DMG
            os: macos-14
            artifact: macos-arm64-dmg
            command: yarn electron-builder --mac dmg --arm64 --publish never
            asset: dist/LosslessCut-mac-arm64.dmg
          - name: Windows x64 archive
            os: windows-latest
            artifact: windows-x64-7z
            command: yarn electron-builder --win 7z --x64 --publish never
            asset: dist/LosslessCut-win-x64.7z

    steps:
      # Windows fix. See https://github.com/actions/checkout/issues/226
      - run: git config --global core.autocrlf false
        if: runner.os == 'Windows'

      - uses: actions/checkout@v6

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      - name: Download macOS arm64 FFmpeg
        if: runner.os == 'macOS'
        run: yarn download-ffmpeg-darwin-arm64

      - name: Download Windows x64 FFmpeg
        if: runner.os == 'Windows'
        run: yarn download-ffmpeg-win32-x64

      - run: yarn build
        env:
          NODE_OPTIONS: --experimental-strip-types

      - name: Build package
        run: ${{ matrix.command }}
        env:
          NODE_OPTIONS: --experimental-strip-types

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create and publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" release-assets/* --clobber
